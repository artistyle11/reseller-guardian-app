<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reseller Guardian</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #222; }
  .header { background: #1a1a2e; color: white; padding: 16px; text-align: center; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header p { font-size: 12px; opacity: 0.7; margin-top: 4px; }
  .container { padding: 16px; max-width: 480px; margin: 0 auto; }
  .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
  input, select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; background: #fafafa; }
  input:focus, select:focus { outline: none; border-color: #1a1a2e; background: white; }
  .photo-btn { width: 100%; padding: 14px; background: #1a1a2e; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .photo-btn:active { opacity: 0.85; }
  .preview { width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
  .submit-btn { width: 100%; padding: 16px; background: #16a34a; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; }
  .submit-btn:disabled { background: #aaa; }
  .submit-btn:active { opacity: 0.85; }
  .status { text-align: center; font-size: 14px; margin-top: 12px; min-height: 20px; color: #16a34a; }
  .status.error { color: #dc2626; }
  #file-input { display: none; }
</style>
</head>
<body>

<div class="header">
  <h1>Reseller Guardian</h1>
  <p>Sourcing scan tool</p>
</div>

<div class="container">

  <div class="card">
    <label>Item photo</label>
    <button class="photo-btn" onclick="document.getElementById('file-input').click()">
      📷 Take / choose photo
    </button>
    <input type="file" id="file-input" accept="image/*" capture="environment" onchange="handlePhoto(this)">
    <img id="preview" class="preview" alt="Item preview">
  </div>

  <div class="card">
    <label for="item_name">Item name <span style="font-weight:400;color:#999">(edit if needed)</span></label>
    <input type="text" id="item_name" placeholder="Identifying item...">
  </div>

  <div class="card">
    <label for="ask_price">Asking price ($)</label>
    <input type="number" id="ask_price" placeholder="0.00" step="0.01" min="0">
  </div>

  <div class="card">
    <label for="source_location">Source location</label>
    <input type="text" id="source_location" placeholder="e.g. Goodwill Denver CO">
  </div>

  <button class="submit-btn" id="submit-btn" onclick="submitScan()">
    Search pricing data
  </button>

  <div class="status" id="status"></div>

</div>

<script>
const WEBHOOK_URL ='https://hook.us2.make.com/v6x8x1t2putuhv3v6duetb95wbhmbsbx';

let photoBase64 = null;

function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    photoBase64 = e.target.result.split(',')[1];
    const preview = document.getElementById('preview');
    preview.src = e.target.result;
    preview.style.display = 'block';
    document.getElementById('item_name').value = 'Identifying item...';
  };
  reader.readAsDataURL(file);
}

async function submitScan() {
  const item_name = document.getElementById('item_name').value.trim();
  const ask_price = document.getElementById('ask_price').value;
  const source_location = document.getElementById('source_location').value.trim();

  if (!photoBase64) { showStatus('Please take or choose a photo first.', true); return; }
  if (!ask_price) { showStatus('Please enter the asking price.', true); return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = 'Scanning...';
  showStatus('');

  try {
    const response = await fetch(WEBHOOK_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        item_photo: photoBase64,
        item_name: item_name,
        ask_price: parseFloat(ask_price),
        source_location: source_location,
        scan_datetime: new Date().toISOString()
      })
    });

    if (response.ok) {
      showStatus('Scan submitted. Results coming shortly.');
      btn.textContent = 'Scan another item';
      btn.disabled = false;
    } else {
      showStatus('Submission error. Try again.', true);
      btn.textContent = 'Search pricing data';
      btn.disabled = false;
    }
  } catch(e) {
    showStatus('Connection error. Check your internet.', true);
    btn.textContent = 'Search pricing data';
    btn.disabled = false;
  }
}

function showStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}
</script>

</body>
</html>
