<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reseller Guardian</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #222; }
.header { background: #1a1a2e; color: white; padding: 16px; text-align: center; }
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 12px; opacity: 0.7; margin-top: 4px; }
.container { padding: 16px; max-width: 480px; margin: 0 auto; }
.card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
label { font-size: 13px; font-weight: 600; color: #555; display: block; margin-bottom: 6px; }
input { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; background: #fafafa; }
input:focus { outline: none; border-color: #1a1a2e; background: white; }
.photo-btn { width: 100%; padding: 14px; background: #1a1a2e; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; }
.preview { width: 100%; border-radius: 8px; margin-top: 10px; display: none; }
.submit-btn { width: 100%; padding: 16px; background: #16a34a; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; }
.submit-btn:disabled { background: #aaa; }
.status { text-align: center; font-size: 14px; margin-top: 12px; min-height: 20px; color: #16a34a; }
.status.error { color: #dc2626; }
</style>
</head>
<body>
<div class="header">
  <h1>Reseller Guardian</h1>
  <p>Sourcing scan tool</p>
</div>
<div class="container">
  <div class="card">
    <label>Item photo</label>
    <button class="photo-btn" onclick="document.getElementById('file-input').click()">Take / choose photo</button>
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none" onchange="handlePhoto(this)">
    <img id="preview" class="preview" alt="Item preview">
  </div>
  <div class="card">
    <label for="item_name">Item name</label>
    <input type="text" id="item_name" placeholder="Will be identified from photo">
  </div>
  <div class="card">
    <label for="ask_price">Asking price ($)</label>
    <input type="number" id="ask_price" placeholder="0.00" step="0.01" min="0">
  </div>
  <div class="card">
    <label for="source_location">Source location</label>
    <input type="text" id="source_location" placeholder="e.g. Goodwill Denver CO">
  </div>
  <button class="submit-btn" id="submit-btn" onclick="submitScan()">Search pricing data</button>
  <div class="status" id="status"></div>
</div>
<iframe name="hidden-iframe" style="display:none"></iframe>
<form id="hidden-form" method="POST" target="hidden-iframe" style="display:none">
  <input type="hidden" name="item_photo" id="form-photo">
  <input type="hidden" name="item_name" id="form-name">
  <input type="hidden" name="ask_price" id="form-price">
  <input type="hidden" name="source_location" id="form-location">
  <input type="hidden" name="scan_datetime" id="form-datetime">
</form>
<script>
const WEBHOOK_URL = 'https://hook.us2.make.com/v6x8x1t2putuhv3v6duetb95wbhmbsbx';
let photoBase64 = null;

function handlePhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.src = e.target.result;
    img.onload = function() {
      const canvas = document.createElement('canvas');
      const max = 800;
      let w = img.width, h = img.height;
      if (w > max || h > max) {
        if (w > h) { h = Math.round(h * max / w); w = max; }
        else { w = Math.round(w * max / h); h = max; }
      }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      photoBase64 = canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
      const preview = document.getElementById('preview');
      preview.src = canvas.toDataURL('image/jpeg', 0.7);
      preview.style.display = 'block';
    };
  };
  reader.readAsDataURL(file);
}

function submitScan() {
  if (!photoBase64) { showStatus('Please take or choose a photo first.', true); return; }
  const ask_price = document.getElementById('ask_price').value;
  if (!ask_price) { showStatus('Please enter the asking price.', true); return; }
  document.getElementById('form-photo').value = photoBase64;
  document.getElementById('form-name').value = document.getElementById('item_name').value;
  document.getElementById('form-price').value = ask_price;
  document.getElementById('form-location').value = document.getElementById('source_location').value;
  document.getElementById('form-datetime').value = new Date().toISOString();
  const form = document.getElementById('hidden-form');
  form.action = WEBHOOK_URL;
  form.submit();
  showStatus('Scan submitted successfully.');
  const btn = document.getElementById('submit-btn');
  btn.textContent = 'Scan another item';
  photoBase64 = null;
  document.getElementById('preview').style.display = 'none';
  document.getElementById('file-input').value = '';
}

function showStatus(msg, isError) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (isError ? ' error' : '');
}
</script>
</body>
</html>
